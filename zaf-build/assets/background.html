<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>TSANet Connect — Background</title>
  <!-- ZAF SDK — required even for background pages -->
  <script src="https://static.zdassets.com/zendesk_app_framework_sdk/2.0/zaf_sdk.min.js"></script>
</head>
<body>
<script>
/**
 * TSANet Connect — Background Poller
 *
 * Runs silently whenever Zendesk is open in the browser.
 * No UI. No agent interaction required.
 *
 * Every poll cycle (POLL_INTERVAL_MS):
 *   1. Fetch all OPEN/INFORMATION inbound collaboration requests from TSANet
 *   2. For each one, search Zendesk for an existing ticket with that token
 *   3. Create a Zendesk ticket for any that are missing
 *
 * Reuses the same credentials configured in the app settings.
 */

(function() {
  'use strict';

  var POLL_INTERVAL_MS = 60 * 1000; // 1 minute (JWT is cached ~50 min, so this does not increase login calls)
  var client   = null;
  var settings = {};
  var _jwt     = null;
  var _jwtExp  = 0;

  // ZIS-push coexistence (tsanetgit/Zendesk_App#30): when an authenticated
  // webhook (callbackAuth) is registered on the TSANet side, ZIS push is the
  // primary ticket creator; the poller then only backfills a missing ticket
  // after a grace window, so it stops racing push and creating duplicates.
  var PUSH_FALLBACK_GRACE_MS = 3 * 60 * 1000;
  var _pushRegistered    = null; // true/false once known; null = not yet checked
  var _firstSeenNoTicket = {};   // token -> ms first seen open-inbound without a ticket

  // ── Init ──────────────────────────────────────────────────────────────────
  if (typeof ZAFClient === 'undefined') {
    console.error('[TSANet BG] ZAFClient not available');
    return;
  }

  client = ZAFClient.init();

  client.on('app.registered', function() {
    client.metadata().then(function(meta) {
      settings = meta.settings || {};

      // tsanet_password is a secure setting (not exposed to front-end JS); a
      // missing/invalid password surfaces on the login call instead.
      if (!settings.tsanet_username) {
        console.warn('[TSANet BG] Credentials not configured — background polling disabled');
        return;
      }

      console.log('[TSANet BG] Started — polling every 1 minute');

      // One-time check: is ZIS push (an authenticated webhook) registered? If so,
      // the poller becomes a fallback that defers ticket creation to push (#30).
      tsanetGet('/webhooks').then(function(subs) {
        _pushRegistered = Array.isArray(subs) && subs.some(function(s) {
          return s && s.callbackAuthType && s.callbackAuthType !== 'NONE';
        });
        console.log('[TSANet BG] ZIS push registered: ' + _pushRegistered +
                    ' (poller is ' + (_pushRegistered ? 'fallback' : 'primary') + ')');
      }).catch(function() { _pushRegistered = false; });

      // Run immediately on startup, then on POLL_INTERVAL_MS
      pollForInboundCases();
      pollForSlaBreaches();
      setInterval(pollForInboundCases, POLL_INTERVAL_MS);
      setInterval(pollForSlaBreaches, POLL_INTERVAL_MS);

    }).catch(function(err) {
      console.error('[TSANet BG] Failed to load settings:', err);
    });
  });

  // ── TSANet Auth ───────────────────────────────────────────────────────────
  function baseUrl() {
    return (settings.tsanet_env === 'PRODUCTION')
      ? 'https://connect2.tsanet.org/v1'
      : 'https://connect2.tsanet.net/v1';
  }

  function getJwt() {
    if (_jwt && Date.now() < _jwtExp) return Promise.resolve(_jwt);
    // Log in through the ZAF proxy with secure:true so the proxy substitutes
    // {{setting.tsanet_password}} server-side — the password is never in
    // front-end JS. Proxy mode (no cors:true) to a domainWhitelist host.
    return client.request({
      url: baseUrl() + '/login',
      type: 'POST',
      contentType: 'application/json',
      dataType: 'json',
      secure: true,
      data: JSON.stringify({
        username: settings.tsanet_username,
        password: '{{setting.tsanet_password}}'
      })
    }).then(function(data) {
      if (!data || !data.accessToken) throw new Error('No accessToken in response');
      _jwt    = data.accessToken;
      _jwtExp = Date.now() + 50 * 60 * 1000; // cache for 50 min
      return _jwt;
    }, function(err) {
      var status = (err && err.status) || '?';
      var detail = (err && (err.responseText || (err.responseJSON && JSON.stringify(err.responseJSON)))) || '';
      throw new Error('TSANet login failed (HTTP ' + status + '). ' + String(detail).substring(0, 80));
    });
  }

  function tsanetGet(path) {
    return getJwt().then(function(jwt) {
      return fetch(baseUrl() + path, {
        headers: { Authorization: 'Bearer ' + jwt }
      });
    }).then(function(res) {
      if (res.status === 401) { _jwt = null; return tsanetGet(path); }
      if (!res.ok) throw new Error('TSANet GET failed: ' + res.status);
      return res.json();
    });
  }

  // ── SLA Breach Detection ──────────────────────────────────────────────────
  // Every poll cycle: find any OPEN/INFORMATION cases past their respondBy
  // deadline and add tag tsanet_sla_breached to the corresponding Zendesk ticket.
  // The tag is only added once (idempotent check prevents repeat notifications).
  // A Zendesk trigger fires on tag addition → emails the assignee.
  function pollForSlaBreaches() {
    console.log('[TSANet BG] Checking for SLA breaches...');

    // Only check OPEN cases — SLA is acknowledgment-only per TSANet policy.
    // Once a case is acknowledged (Accept/Reject/Req Info), TSANet stops tracking it.
    Promise.all([
      tsanetGet('/collaboration-requests?status=OPEN').catch(function() { return []; })
    ]).then(function(results) {
      var allActive = results[0] || [];
      var now = Date.now();

      var breached = allActive.filter(function(c) {
        return c.respondBy && c.responded === false && new Date(c.respondBy).getTime() < now;
      });

      if (!breached.length) {
        console.log('[TSANet BG] No SLA breaches found');
        return;
      }

      console.log('[TSANet BG] Found ' + breached.length + ' SLA breach(es) — tagging tickets');

      return Promise.all(breached.map(function(c) {
        // Find the Zendesk ticket for this token
        return client.request({
          url: '/api/v2/search.json?query=custom_field_' +
               settings.field_id_token + ':' + c.token + '&type=ticket',
          type: 'GET'
        }).then(function(res) {
          if (!res.count || !res.results.length) return;
          var ticket = res.results[0];

          // Skip if already tagged — prevents duplicate trigger fires
          if ((ticket.tags || []).indexOf('tsanet_sla_breached') !== -1) return;

          // Add breach tag via POST (additive — preserves existing tags)
          return client.request({
            url: '/api/v2/tickets/' + ticket.id + '/tags.json',
            type: 'POST',
            contentType: 'application/json',
            data: JSON.stringify({ tags: ['tsanet_sla_breached'] })
          }).then(function() {
            console.log('[TSANet BG] ⚠️ SLA breached — tagged ticket #' + ticket.id +
                        ' (token ' + c.token.substring(0, 8) + '...)');
          });
        }).catch(function(err) {
          console.warn('[TSANet BG] SLA tag error for token ' +
                       c.token.substring(0, 8) + '...:', err.message || String(err));
        });
      }));

    }).catch(function(err) {
      console.error('[TSANet BG] SLA breach check failed:', err.message || String(err));
    });
  }

  // ── Core Poll Logic ───────────────────────────────────────────────────────
  function pollForInboundCases() {
    console.log('[TSANet BG] Polling for inbound cases...');

    tsanetGet('/collaboration-requests?type=INBOUND').then(function(cases) {
      var open = (cases || []).filter(function(c) {
        return c.status === 'OPEN' || c.status === 'INFORMATION';
      });

      if (!open.length) {
        console.log('[TSANet BG] No open inbound cases');
        return;
      }

      console.log('[TSANet BG] Found ' + open.length + ' open inbound case(s) — checking for missing tickets');

      // Check each token against Zendesk search
      return Promise.all(open.map(function(collab) {
        return client.request({
          url: '/api/v2/search.json?query=custom_field_' +
               settings.field_id_token + ':' + collab.token + '&type=ticket',
          type: 'GET'
        }).then(function(res) {
          return { collab: collab, exists: res.count > 0 };
        }).catch(function() {
          return { collab: collab, exists: true }; // assume exists on error — be conservative
        });
      })).then(function(checked) {
        checked.forEach(function(r) { if (r.exists) delete _firstSeenNoTicket[r.collab.token]; });
        var now = Date.now();
        var toCreate = checked.filter(function(r) {
          if (r.exists) return false;
          var tok = r.collab.token;
          if (_pushRegistered === false) { delete _firstSeenNoTicket[tok]; return true; } // no push: poller is primary
          if (!_firstSeenNoTicket[tok]) _firstSeenNoTicket[tok] = now;                     // push (or unknown): defer, backfill only after grace
          return (now - _firstSeenNoTicket[tok]) >= PUSH_FALLBACK_GRACE_MS;
        });

        if (!toCreate.length) {
          console.log('[TSANet BG] All inbound cases already have Zendesk tickets');
          return;
        }

        console.log('[TSANet BG] Creating ' + toCreate.length + ' missing ticket(s)');

        return Promise.all(toCreate.map(function(r) {
          var c = r.collab;
          var zdPriority = c.priority === 'HIGH' ? 'urgent'
                         : c.priority === 'MEDIUM' ? 'normal' : 'low';

          return client.request({
            url: '/api/v2/tickets.json',
            type: 'POST',
            contentType: 'application/json',
            data: JSON.stringify({
              ticket: {
                subject: 'TSANet Inbound from ' + c.submitCompanyName + ': ' + c.summary,
                description: 'Inbound TSANet Collaboration Request.\n\nFrom: ' +
                  c.submitCompanyName + '\nPriority: ' + c.priority +
                  '\nToken: ' + c.token + '\n\n' + (c.description || ''),
                priority: zdPriority,
                tags: ['tsanet_inbound', 'tsanet_status_open'],
                comment: {
                  body: '\u2b05\ufe0f New inbound TSANet Collaboration Request from ' +
                    c.submitCompanyName + '.\n\nPriority: ' + c.priority +
                    '\nToken: ' + c.token +
                    '\n\nTo respond, set the TSANet Action field (Accept / Request Info / Reject) and submit the ticket, or use the TSANet Connect app in the sidebar.',
                  public: false
                },
                custom_fields: [
                  { id: parseInt(settings.field_id_token),   value: c.token },
                  { id: parseInt(settings.field_id_status),  value: 'tsanet_status_open' },
                  { id: parseInt(settings.field_id_partner), value: c.submitCompanyName }
                ]
              }
            })
          }).then(function(resp) {
            console.log('[TSANet BG] \u2705 Created ticket #' + resp.ticket.id +
                        ' for inbound case ' + c.token.substring(0, 8) + '...');
          });
        }));
      });

    }).catch(function(err) {
      console.error('[TSANet BG] Poll error:', err.message || String(err));
      // Token may have expired — clear so next poll re-authenticates
      if (String(err).includes('401') || String(err).includes('login')) {
        _jwt = null;
      }
    });
  }

})();
</script>
</body>
</html>
